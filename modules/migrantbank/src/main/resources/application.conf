app{

http {
  host = "0.0.0.0"
  port = 8080
}

db {
  jdbc-url = "jdbc:postgresql://localhost:5432/migrant_bank"
  user = "postgres"
  password = "password"
  max-pool-size = 10
}

security {
  # Use a secure 32-byte or 64-byte base64 string here
  encryption-key-base64 = "YmFzZTY0LWV"
  sms-code-ttl-minutes = 5
  
  jwt {
    issuer = "https://migrantbank.com"
    secret = "your-very-long-and-secure-jwt-signing-secret"
    access-token-minutes = 15
    remote-token-days = 30
  }
}

fraud {
  flag-threshold-minor = 1000000
}

rate-limit {
  requests-per-minute = 100
  login-per-minute = 5
}

monitoring {
  interval-seconds = 60
  alert-email = "ops@migrantbank.com"
  alert-phone = "+230" 
}
}