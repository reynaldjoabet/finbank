# =============================================================================
# HikariCP — Production-Grade Connection Pool Configuration
# =============================================================================

db {
  default {
    # --- Driver / Connection URL ---
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://your-db-host:5432/your_database"
    url = ${?DATABASE_URL}                          # Override via environment variable

    username = "app_user"
    username = ${?DATABASE_USERNAME}
    password = "changeme"
    password = ${?DATABASE_PASSWORD}

    # --- HikariCP Settings ---
    hikaricp {

      # Pool name (appears in logs and JMX)
      poolName = "HikariPool-Production"

      # Maximum number of connections in the pool.
      # Keep this LOW. See: https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing
      # Formula: connections ≈ ((core_count * 2) + effective_spindle_count)
      # For a 4-core server with SSD: ~10 is a good starting point.
      maximumPoolSize = 10
      maximumPoolSize = ${?HIKARI_MAX_POOL_SIZE}

      # Keep pool fixed-size for best performance and spike responsiveness.
      # HikariCP recommends minimumIdle = maximumPoolSize (the default).
      minimumIdle = 10
      minimumIdle = ${?HIKARI_MIN_IDLE}

      # --- Timeouts (all in milliseconds) ---

      # Max time a client will wait for a connection from the pool.
      # 30 seconds is the default; reduce for faster failure in high-throughput apps.
      connectionTimeout = 30000

      # Max idle time for a connection (only matters if minimumIdle < maximumPoolSize).
      # 10 minutes default. Set to 0 to never retire idle connections.
      idleTimeout = 600000

      # Max lifetime of a connection in the pool.
      # MUST be several seconds shorter than your database's connection timeout
      # (e.g., PostgreSQL wait_timeout, MySQL wait_timeout).
      # Default: 30 minutes. Set to ~28-29 min if DB timeout is 30 min.
      maxLifetime = 1800000

      # Keepalive interval to prevent connections from being timed out
      # by the database or network infrastructure.
      # Must be less than maxLifetime. Default: 2 minutes.
      keepaliveTime = 120000

      # Validation timeout — max time to test a connection for aliveness.
      # Must be less than connectionTimeout.
      validationTimeout = 5000

      # --- Connection Behavior ---

      # Auto-commit: set to false if your framework manages transactions (e.g., Hibernate/JPA).
      autoCommit = true

      # Leak detection: log a warning if a connection is checked out for longer than this.
      # 0 = disabled. For production, set to something like 60 seconds to detect leaks.
      leakDetectionThreshold = 60000

      # Fail-fast on startup: wait up to 1ms (effectively instant) to acquire
      # the first connection. If the DB is down, the app won't start.
      initializationFailTimeout = 1

      # Register JMX MBeans for monitoring pool metrics at runtime.
      registerMbeans = true

      # SQL executed on every new connection before it enters the pool.
      # Useful for setting session-level parameters.
      # connectionInitSql = "SET timezone = 'UTC'"

      # Transaction isolation (uncomment if needed globally).
      # transactionIsolation = "TRANSACTION_READ_COMMITTED"
    }

    # --- PostgreSQL DataSource Properties (passed through to the driver) ---
    # Enable prepared-statement caching at the driver level (NOT at the pool level).
    dataSource {
      cachePrepStmts = true
      prepStmtCacheSize = 250
      prepStmtCacheSqlLimit = 2048

      # TCP keepalive — CRITICAL for production to prevent silent connection drops.
      # HikariCP README strongly recommends configuring TCP keepalive.
      tcpKeepAlive = true

      # Socket timeout to prevent indefinitely hanging queries (in seconds).
      socketTimeout = 30

      # SSL mode for encrypted connections.
      # sslmode = "require"
    }
  }
}