name: Scala CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Security: Apply the principle of least privilege
permissions:
  contents: read

jobs:
  build:
    name: Build Java ${{ matrix.java }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30 
    
    strategy:
      fail-fast: false 
      matrix:
        java: [17, 21]
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'sbt'
          check-latest: false
          cache-dependency-path: |
            **/*.sbt
            **/project/build.properties
            **/project/*.scala
            **/project/**/*.scala
      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Run Tests
        run: sbt test